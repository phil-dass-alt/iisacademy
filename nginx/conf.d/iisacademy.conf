# IIS Academy – Virtual host configuration
# Handles iisacademy.in, its subdomains, and iiskills.cloud
#
# iisacademy.in subdomains:
#   iisacademy.in          → landing app   (port 3000)
#   portal.iisacademy.in   → student portal (port 3001)
#   admin.iisacademy.in    → admin panel   (port 3002)
#   b2b.iisacademy.in      → B2B portal    (port 3003)
#
# iiskills.cloud subdomains (same apps, NEXT_PUBLIC_SITE_ID=iiskills):
#   iiskills.cloud         → landing app   (port 3000)
#   portal.iiskills.cloud  → student portal (port 3001)
#   admin.iiskills.cloud   → admin panel   (port 3002)
#   b2b.iiskills.cloud     → B2B portal    (port 3003)
#
# SSL certificates are managed by Certbot/Let's Encrypt.
# Run: certbot --nginx \
#   -d iisacademy.in  -d portal.iisacademy.in \
#   -d admin.iisacademy.in -d b2b.iisacademy.in \
#   -d iiskills.cloud -d portal.iiskills.cloud \
#   -d admin.iiskills.cloud -d b2b.iiskills.cloud

# ── HTTP → HTTPS redirect (all hosts) ─────────────────────────────────────────
server {
    listen 80;
    server_name iisacademy.in www.iisacademy.in
                portal.iisacademy.in
                admin.iisacademy.in
                b2b.iisacademy.in
                iiskills.cloud www.iiskills.cloud
                portal.iiskills.cloud
                admin.iiskills.cloud
                b2b.iiskills.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Landing (https://iisacademy.in) ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name iisacademy.in www.iisacademy.in;

    ssl_certificate     /etc/letsencrypt/live/iisacademy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iisacademy.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate-limit login endpoint
    location /login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://landing_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://landing_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Static assets – long-lived cache
    location /_next/static/ {
        proxy_pass http://landing_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://landing_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}


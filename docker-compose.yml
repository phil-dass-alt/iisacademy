# IIS Academy – Production Docker Compose
# Deploys all four primary apps behind an Nginx reverse proxy.
#
# Usage:
#   cp .env.production.example .env.production
#   # Fill in all required values in .env.production
#   docker compose --env-file .env.production -f docker-compose.yml up -d --build

version: '3.9'

services:
  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - landing
      - student-portal
      - admin
      - b2b
    networks:
      - iisacademy

  # ── Landing (iisacademy.in) ──────────────────────────────────────────────────
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: landing
        APP_PORT: "3000"
    image: iisacademy/landing:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_LANDING_URL:-https://iisacademy.in}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_LANDING_URL=${NEXT_PUBLIC_LANDING_URL:-https://iisacademy.in}
      - NEXT_PUBLIC_STUDENT_PORTAL_URL=${NEXT_PUBLIC_STUDENT_PORTAL_URL:-https://portal.iisacademy.in}
      - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-https://admin.iisacademy.in}
      - NEXT_PUBLIC_B2B_URL=${NEXT_PUBLIC_B2B_URL:-https://b2b.iisacademy.in}
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      - BYPASS_SUBSCRIPTION_CHECK=${BYPASS_SUBSCRIPTION_CHECK:-false}
    networks:
      - iisacademy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Student Portal (portal.iisacademy.in) ────────────────────────────────────
  student-portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: student-portal
        APP_PORT: "3001"
    image: iisacademy/student-portal:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_PORTAL_URL:-https://portal.iisacademy.in}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_LANDING_URL=${NEXT_PUBLIC_LANDING_URL:-https://iisacademy.in}
      - NEXT_PUBLIC_STUDENT_PORTAL_URL=${NEXT_PUBLIC_STUDENT_PORTAL_URL:-https://portal.iisacademy.in}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_MIXPANEL_TOKEN=${NEXT_PUBLIC_MIXPANEL_TOKEN}
      - BYPASS_SUBSCRIPTION_CHECK=${BYPASS_SUBSCRIPTION_CHECK:-false}
    networks:
      - iisacademy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin Panel (admin.iisacademy.in) ────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin
        APP_PORT: "3002"
    image: iisacademy/admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_ADMIN_URL:-https://admin.iisacademy.in}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_LANDING_URL=${NEXT_PUBLIC_LANDING_URL:-https://iisacademy.in}
    networks:
      - iisacademy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── B2B School Portal (b2b.iisacademy.in) ───────────────────────────────────
  b2b:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: b2b
        APP_PORT: "3003"
    image: iisacademy/b2b:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_B2B_URL:-https://b2b.iisacademy.in}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_LANDING_URL=${NEXT_PUBLIC_LANDING_URL:-https://iisacademy.in}
    networks:
      - iisacademy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3003/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nginx_logs:

networks:
  iisacademy:
    driver: bridge
